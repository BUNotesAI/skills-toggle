name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: skills-toggle-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: skills-toggle-darwin-amd64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: skills-toggle-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: skills-toggle-linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.artifact }}.tar.gz skills-toggle
          mv ${{ matrix.artifact }}.tar.gz ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Generate SHA256 checksums
          cd artifacts
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt
          cd ..

          gh release create ${{ github.ref_name }} \
            artifacts/*.tar.gz \
            artifacts/checksums.txt \
            --title "${{ github.ref_name }}" \
            --generate-notes

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          # Skip tap update if TAP_TOKEN is not set
          if [ -z "$GH_TOKEN" ]; then
            echo "TAP_TOKEN not set, skipping tap update"
            exit 0
          fi

          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}

          # Get SHA256 for each platform
          cd artifacts
          SHA_DARWIN_ARM64=$(sha256sum skills-toggle-darwin-arm64.tar.gz | awk '{print $1}')
          SHA_DARWIN_AMD64=$(sha256sum skills-toggle-darwin-amd64.tar.gz | awk '{print $1}')
          SHA_LINUX_AMD64=$(sha256sum skills-toggle-linux-amd64.tar.gz | awk '{print $1}')
          SHA_LINUX_ARM64=$(sha256sum skills-toggle-linux-arm64.tar.gz | awk '{print $1}')
          cd ..

          # Clone tap repo
          git clone https://x-access-token:${GH_TOKEN}@github.com/BUNotesAI/homebrew-skills-toggle.git tap
          cd tap

          cat > Formula/skills-toggle.rb << FORMULA
          class SkillsToggle < Formula
            desc "TUI tool for enabling/disabling Claude Code skills"
            homepage "https://github.com/BUNotesAI/skills-toggle"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/BUNotesAI/skills-toggle/releases/download/${TAG}/skills-toggle-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              elsif Hardware::CPU.intel?
                url "https://github.com/BUNotesAI/skills-toggle/releases/download/${TAG}/skills-toggle-darwin-amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/BUNotesAI/skills-toggle/releases/download/${TAG}/skills-toggle-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              elsif Hardware::CPU.intel?
                url "https://github.com/BUNotesAI/skills-toggle/releases/download/${TAG}/skills-toggle-linux-amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "skills-toggle"
            end

            test do
              assert_match "skills-toggle", shell_output("#{bin}/skills-toggle --help")
            end
          end
          FORMULA

          # Remove leading spaces from heredoc
          sed -i 's/^          //' Formula/skills-toggle.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/skills-toggle.rb
          git commit -m "Update skills-toggle to ${VERSION}"
          git push
